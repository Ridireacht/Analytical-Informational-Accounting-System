<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Классы болезней, которые влияют на расход ЛС</title>
  <link rel="stylesheet" type="text/css" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.3.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<nav>
  <div class="nav-left">
    <span th:text="'Здравствуйте, ' + ${username} + '!'"></span>
  </div>
  <div class="nav-right">
    <a href="/logout">
      <button>Выйти</button>
    </a>
  </div>
</nav>

<h1 style="text-align: center;">Классы болезней, которые влияют на расход ЛС</h1>

<div class="add-form-form" id="form">
  <div class="left-section">
    <label for="disease-type-id">Выберите класс болезни:</label><br>
    <select id="disease-type-id">
      <option th:each="diseaseType : ${diseaseTypes}" th:value="${diseaseType.id}" th:text="${diseaseType.name}"></option>
    </select><br><br>
  </div>
</div>

<div style="margin-top: 60px;"></div>

<div class="add-form">
  <p>Коэффициент предполагаемого эпидемического спроса: <span id="epidemic"></span></p>
  <br><br><br>
  <div class="chart-container">
    <canvas id="yearly-chart"></canvas>
  </div>
</div>

<div style="margin-top: 20px;"></div>

<div class="add-form" id="seasonic-container">
  <div class="chart-container">
    <canvas id="seasonic-chart"></canvas>
  </div>
</div>

<div style="margin-top: 20px;"></div>

<table id="records-table">
  <thead>
  <tr>
    <th>ID</th>
    <th>Полный код</th>
  </tr>
  </thead>
  <tbody id="records-tbody">
  </tbody>
</table>

<div class="button-container">
  <a href="/home" class="home-button">Домой</a>
</div>

<script th:inline="javascript">
  var seasonicChart;
  var yearlyChart;
  var diseaseTypes = /*[[${diseaseTypes}]]*/ [];

  const select = document.getElementById('disease-type-id');
  const tbody = document.getElementById('records-tbody');

  function renderCategories(diseaseTypeId) {
      tbody.innerHTML = ''; // очищаем таблицу
      if (!diseaseTypeId) return; // если ничего не выбрано, оставляем пустой

      // находим diseaseType по id
      const selectedType = diseaseTypes.find(dt => dt.id === parseInt(diseaseTypeId));
      if (!selectedType || !selectedType.categories) return;

      // добавляем категории в таблицу
      selectedType.categories.forEach(cat => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${cat.id}</td><td>${cat.code}</td>`;
          tbody.appendChild(tr);
      });
  }

  function getData() {
    const diseaseTypeId = document.getElementById("disease-type-id").value;
    const diseaseTypeIdNum = parseInt(diseaseTypeId);
    const selectedType = diseaseTypes.find(d => d.id === diseaseTypeIdNum);

    document.getElementById("epidemic").textContent = selectedType.epidemicMultiplier;

    if (yearlyChart) {
        yearlyChart.destroy();
    }

    var ctx = document.getElementById('yearly-chart').getContext('2d');
    yearlyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: selectedType.yearsAccounted,
            datasets: [{
                label: 'Случаи заболеваний',
                data: selectedType.diseaseCountsPerYear,
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1,
                pointRadius: 3,  // начальный размер точек
                pointHoverRadius: 5  // начальный размер точек при наведении
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            },
            plugins: {
                title: {
                    display: true,
                    text: 'Количество заболеваний соответствующим классом по годам',
                    position: 'bottom'
                }
            }
        }
    });

    yearlyChart.update();

    const seasonicContainer = document.getElementById('seasonic-container');

    if (selectedType.monthMultipliers && selectedType.monthMultipliers.length > 0) {
        // показываем блок
        seasonicContainer.style.display = '';

        // создаем/обновляем график
        if (seasonicChart) seasonicChart.destroy();
        const ctxSeasonic = document.getElementById('seasonic-chart').getContext('2d');
        seasonicChart = new Chart(ctxSeasonic, {
            type: 'line',
            data: {
                labels: ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"],
                datasets: [{
                    label: 'Коэффициент заболеваемости относительно средних значений',
                    data: selectedType.monthMultipliers,
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1,
                    pointRadius: 3,
                    pointHoverRadius: 5
                }]
            },
            options: {
                scales: { y: { beginAtZero: true } },
                plugins: { title: { display: true, text: 'Сезонность класса заболеваний', position: 'bottom' } }
            }
        });
    } else {
        // скрываем блок, если данных нет
        seasonicContainer.style.display = 'none';

        // если график был, уничтожаем его
        if (seasonicChart) {
            seasonicChart.destroy();
            seasonicChart = null;
        }
    }

    renderCategories(select.value);
  }


  document.addEventListener("DOMContentLoaded", function() {
    getData();
  });


  document.getElementById('disease-type-id').addEventListener('change', function() {
    getData();
  });
</script>
</body>
</html>

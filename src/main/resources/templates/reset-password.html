<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <style>
        .full-height {
            height: 100vh;
        }
        .centered {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 100%;
            max-width: 500px; /* Максимальная ширина карточки */
        }
    </style>
</head>
<body>
<div class="container full-height centered">
    <div class="row w-50">
        <div class="col-md-12"> <!-- Убираем отступ по ширине, чтобы было по центру -->
            <div th:if="${param.success}">
                <div class="alert alert-success">Если email существует, на него была отправлена ссылка для сброса</div>
            </div>

            <div class="card mx-auto"> <!-- Центрируем карточку -->
                <div class="card-header">
                    <h2 class="text-center">Сброс пароля</h2>
                </div>
                <div class="card-body">
                    <form
                            method="post"
                            role="form"
                            class="form-horizontal"
                    >
                        <div class="form-group mb-3">
                            <label class="control-label">Введите email, который принадлежит пользователю</label>
                            <input
                                    type="text"
                                    id="email"
                                    name="email"
                                    class="form-control"
                            />
                        </div>
                        <div class="form-group mb-3 text-center">
                            <button type="button" class="btn btn-primary" onclick="location.href='http://localhost:8080/reset-password?success'">Сброс</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

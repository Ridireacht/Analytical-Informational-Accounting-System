<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Управление пользователями</title>
  <link rel="stylesheet" type="text/css" href="/css/styles.css">
</head>
<body>
<nav>
  <div class="nav-left">
    <span th:text="'Здравствуйте, ' + ${username} + '!'"></span>
  </div>
  <div class="nav-right">
    <a href="/logout">
      <button>Выйти</button>
    </a>
  </div>
</nav>

<h1 style="text-align: center;">Управление пользователями</h1>

<div class="add-form">
  <h2>Добавить нового пользователя</h2>
  <form id="add-form">
    <label for="user-name">ФИО пользователя</label><br>
    <input type="text" id="user-name"><br>
    <label for="user-email">Электронная почта пользователя</label><br>
    <input type="text" id="user-email"><br>
    <label for="user-password">Пароль пользователя</label><br>
    <input type="text" id="user-password"><br><br>
    <button type="submit">Добавить</button>
  </form>
</div>

<div style="margin-top: 60px;"></div>

<div>
  <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Поиск по полям пользователя...">
</div>

<div style="margin-top: 20px;"></div>

<table id="records-table">
  <thead>
  <tr>
    <th onclick="sortTable(0)">ID</th>
    <th onclick="sortTable(1)">ФИО</th>
    <th onclick="sortTable(2)">Электронная почта</th>
    <th onclick="sortTable(3)">Роль</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${users}">
    <td th:text="${user.id}"></td>
    <td th:text="${user.name}" ondblclick="enableEdit(this, '/users/', 'name')"></td>
    <td th:text="${user.email}" ondblclick="enableEdit(this, '/users/', 'email')"></td>
    <td th:text="${user.roleName}"></td>
    <td><button class="delete-button" onclick="deleteRecord(this, '/users/')">Удалить</button></td>
  </tr>
  </tbody>
</table>

<div class="button-container">
  <a href="/home" class="home-button">Домой</a>
</div>

<script src="/js/common.js"></script>
<script>
  document.getElementById("add-form").addEventListener("submit", function(event) {
    event.preventDefault();

    var userName = document.getElementById("user-name").value.trim();
    var userEmail = document.getElementById("user-email").value.trim();
    var userPassword = document.getElementById("user-password").value.trim();

    var requestBody = {
      name: userName,
      email: userEmail,
      password: userPassword,
      roleName: "Пользователь"
    };

    sendPostRequest(requestBody, '/users');
  });
</script>
</body>
</html>
